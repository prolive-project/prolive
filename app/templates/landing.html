<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido a PROLIVE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <!-- 🔹 NAVBAR -->
    <nav class="navbar navbar-expand-lg" style="background-color: #6B8E23;">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="#">PROLIVE</a>
            <button class="btn btn-light fw-bold" data-bs-toggle="modal" data-bs-target="#authModal">Área de Cliente</button>
        </div>
    </nav>

    <!-- 🔹 HERO SECTION -->
    <section id="hero">
        <div class="container text-center">
            <h2>Bienvenido a PROLIVE</h2>
            <p>Optimización de olivares en seto mediante tecnologías avanzadas.</p>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#authModal">Acceder al Área de Cliente</button>
        </div>
    </section>

    <!-- 🔹 MODAL DE LOGIN / REGISTRO -->
    <div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background-color: #6B8E23; color: white;">
                    <h5 class="modal-title" id="authModalLabel">Área de Cliente</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs" id="authTabs">
                        <li class="nav-item">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login">Iniciar Sesión</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register">Registrarse</button>
                        </li>
                    </ul>

                    <div class="tab-content mt-3">
                        <!-- 🔹 LOGIN -->
                        <div class="tab-pane fade show active" id="login">
                            <form id="loginForm">
                                <div class="mb-3">
                                    <input type="email" class="form-control" name="email" placeholder="Correo electrónico" required>
                                </div>
                                <div class="mb-3">
                                    <input type="password" class="form-control" name="password" placeholder="Contraseña" required>
                                </div>
                                <button type="submit" class="btn w-100" style="background-color: #8B5E3B; color: white;">Ingresar</button>
                                <div id="loginError" class="text-danger mt-2"></div>
                            </form>
                        </div>

                        <!-- 🔹 REGISTRO -->
                        <div class="tab-pane fade" id="register">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <input type="text" class="form-control" name="name" placeholder="Nombre completo" required>
                                </div>
                                <div class="mb-3">
                                    <input type="email" class="form-control" name="email" placeholder="Correo electrónico" required>
                                </div>
                                <div class="mb-3">
                                    <input type="password" class="form-control" name="password" placeholder="Contraseña" required>
                                </div>
                                <button type="submit" class="btn w-100" style="background-color: #8B5E3B; color: white;">Registrarse</button>
                                <div id="registerError" class="text-danger mt-2"></div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 🔹 Scripts -->
    <script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
        event.preventDefault();

        let formData = new FormData(this);

        fetch("{{ url_for('auth.login') }}", {
            method: "POST",
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                window.location.href = data.redirect_url;
            } else {
                document.getElementById("loginError").textContent = data.message;
            }
        })
        .catch(error => console.error("Error en la autenticación:", error));
    });

    document.getElementById("registerForm").addEventListener("submit", function(event) {
        event.preventDefault();

        let formData = new FormData(this);

        fetch("{{ url_for('auth.register') }}", {
            method: "POST",
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                window.location.href = data.redirect_url;
            } else {
                document.getElementById("registerError").textContent = data.message;
            }
        })
        .catch(error => console.error("Error en el registro:", error));
    });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
